services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-pro6000
    runtime: nvidia
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_HOME=/models/huggingface
    volumes:
      - ./models:/models
    ipc: host
    command:
      - --model
      - ${MODEL_ID}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      - "0.90"
      - --max-model-len
      - "8192"
      # - --enforce-eager
